name: Build Multi-Arch Container

on:
  workflow_call:
    inputs:
      build-type:
        description: 'Build type (release, nightly, dev)'
        required: true
        type: string
      tag:
        description: 'Container tag (without arch suffix)'
        required: true
        type: string
      push-manifest:
        description: 'Whether to push the multi-arch manifest'
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      build-type:
        description: 'Build type (release, nightly, dev)'
        required: true
        type: choice
        options:
          - dev
          - nightly
          - release
        default: dev
      tag:
        description: 'Container tag (without arch suffix)'
        required: true
        type: string
        default: test
      push-manifest:
        description: 'Whether to push the multi-arch manifest'
        required: false
        type: boolean
        default: true

permissions:
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            extras: all
            arch_suffix: amd64
          - platform: linux/arm64
            extras: all
            arch_suffix: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.0.0
        with:
          platforms: ${{ matrix.arch_suffix }}
      - name: Store/retrieve build caches
        id: cache-buildah
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /var/tmp/buildah-cache-*
          key: buildah-mount-cache-${{ runner.os }}-${{ matrix.arch_suffix }}
      - name: Buildah build
        id: build-image
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2.13
        with:
          image: ${{ github.event.repository.name }}
          platforms: ${{ matrix.platform }}
          build-args: |
            GUIDELLM_BUILD_TYPE=${{ inputs.build-type }}
            GUIDELLM_BUILD_EXTRAS=${{ matrix.extras }}
          tags: ${{ inputs.tag }}-${{ matrix.arch_suffix }}
          layers: true
          containerfiles: |
            ./Containerfile
      - name: Push To ghcr.io
        id: push-to-ghcr
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2.8
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
          registry: ghcr.io/${{ github.repository_owner }}

  create-multiarch-manifest:
    needs: build-and-push
    if: inputs.push-manifest
    runs-on: ubuntu-latest
    steps:
      - name: Create and push multi-arch manifest
        run: |
          # Create manifest list combining both architectures
          podman manifest create ${{ inputs.tag }}

          # Add both architecture images to the manifest
          podman manifest add ${{ inputs.tag }} \
            docker://ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ inputs.tag }}-amd64
          podman manifest add ${{ inputs.tag }} \
            docker://ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ inputs.tag }}-arm64

          # Login to registry
          echo "${{ github.token }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

          # Push the multi-arch manifest
          podman manifest push ${{ inputs.tag }} \
            docker://ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ inputs.tag }}
